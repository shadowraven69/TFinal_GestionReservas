version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: pf_db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-pf_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-pf_password}
      POSTGRES_DB: ${POSTGRES_DB:-pf_reservas}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: pf_backend
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-pf_user}:${POSTGRES_PASSWORD:-pf_password}@db:5432/${POSTGRES_DB:-pf_reservas}
      - SECRET_KEY=${SECRET_KEY:-supersecretkey}
    ports:
      - "8000:8000"
    depends_on:
      - db
    restart: unless-stopped
    volumes:
      # Sincroniza el código en tiempo real para el hot-reload en desarrollo
      - ./backend:/app

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: pf_frontend
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data: