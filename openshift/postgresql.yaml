apiVersion: v1
kind: Secret
metadata:
  name: reservas-db-secret
  labels:
    app: reservas-db
type: Opaque
stringData:
  POSTGRESQL_USER: postgres
  POSTGRESQL_PASSWORD: postgres
  POSTGRESQL_DATABASE: reservas_db
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: reservas-db-data
  labels:
    app: reservas-db
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: db
  labels:
    app: reservas-db
spec:
  replicas: 1
  selector:
    matchLabels:
      app: reservas-db
  template:
    metadata:
      labels:
        app: reservas-db
    spec:
      containers:
        - name: postgresql
          image: quay.io/sclorg/postgresql-15-c9s:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 5432
              protocol: TCP
          envFrom:
            - secretRef:
                name: reservas-db-secret
          volumeMounts:
            - name: reservas-db-data
              mountPath: /var/lib/pgsql/data
          readinessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - pg_isready -U "$POSTGRESQL_USER" -d "$POSTGRESQL_DATABASE"
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
          livenessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - pg_isready -U "$POSTGRESQL_USER" -d "$POSTGRESQL_DATABASE"
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 5
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
      volumes:
        - name: reservas-db-data
          persistentVolumeClaim:
            claimName: reservas-db-data
---
apiVersion: v1
kind: Service
metadata:
  name: db
  labels:
    app: reservas-db
spec:
  selector:
    app: reservas-db
  ports:
    - name: postgresql
      port: 5432
      targetPort: 5432
      protocol: TCP
